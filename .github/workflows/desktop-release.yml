name: desktop-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

env:
  OFFICECLI_VERSION: v1.0.71

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14'
            target: 'aarch64-apple-darwin'
            officecli_asset: officecli-mac-arm64
            officecli_out: officecli
          - platform: 'macos-14'
            target: 'x86_64-apple-darwin'
            officecli_asset: officecli-mac-x64
            officecli_out: officecli
          - platform: 'ubuntu-22.04'
            target: ''
            officecli_asset: officecli-linux-x64
            officecli_out: officecli
          - platform: 'windows-latest'
            target: ''
            officecli_asset: officecli-win-x64.exe
            officecli_out: officecli.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: Install npm dependencies
        working-directory: desktop
        run: npm ci

      - name: Setup Python (for wheel build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv (for wheel build)
        run: pip install --upgrade uv

      - name: Prepare bundled resources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p desktop/src-tauri/resources
          # Download platform-specific officecli binary.
          curl -fsSL -o "desktop/src-tauri/resources/${{ matrix.officecli_out }}" \
            "https://github.com/iOfficeAI/OfficeCLI/releases/download/${OFFICECLI_VERSION}/${{ matrix.officecli_asset }}"
          chmod +x "desktop/src-tauri/resources/${{ matrix.officecli_out }}" 2>/dev/null || true
          # Build the Python wheel and copy into the resource dir.
          uv build --wheel
          cp dist/accessibleoffice-*.whl desktop/src-tauri/resources/
          ls -lh desktop/src-tauri/resources/

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('accessibleoffice-desktop {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Upload artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: accessibleoffice-desktop-${{ matrix.platform }}-${{ matrix.target || 'native' }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: ignore
